version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rei
      POSTGRES_USER: rei
      POSTGRES_PASSWORD: rei
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    env_file: ./backend/.env.example
    depends_on: [postgres, redis]
    ports: ["8000:8000"]
  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery worker -l info
    env_file: ./backend/.env.example
    depends_on: [backend, redis]
  frontend:
    build: ./frontend
    env_file: ./frontend/.env.example
    depends_on: [backend]
    ports: ["3000:3000"]
